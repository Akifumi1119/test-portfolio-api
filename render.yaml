services:
  - type: web
    name: petcare-api
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false         # Renderダッシュボードで「php artisan key:generate --show」の値を設定
      - key: APP_URL
        sync: false         # デプロイ後にRenderが発行するURLを設定（例: https://petcare-api.onrender.com）
      - key: FRONTEND_URL
        sync: false         # GitHub PagesのURL（例: https://username.github.io）
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: array
      - key: LOG_CHANNEL
        value: stderr
